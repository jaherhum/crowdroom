<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowdRoom — Login</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/pages/login.css">
  <script type="module" src="/js/pages/login.js"></script>
</head>
<body>
  <main class="page login-page">
    <div class="login-container">
      <header class="login-header">
        <h1>CrowdRoom</h1>
        <p class="text-secondary">Collaborative music, together.</p>
      </header>

      <form id="local-login-form" class="login-form" hidden>
        <div class="input-group">
          <label for="username">Pick a username</label>
          <input id="username" type="text" class="input" placeholder="your name" maxlength="32" autocomplete="off" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Enter</button>
      </form>

      <div id="online-auth" hidden>
        <div class="tab-switcher">
          <button type="button" class="tab active" data-tab="login">Login</button>
          <button type="button" class="tab" data-tab="register">Register</button>
        </div>

        <form id="online-login-form" class="login-form">
          <input type="text" class="input" placeholder="Username or email" name="identifier" autocomplete="username" required>
          <input type="password" class="input" placeholder="Password" name="password" autocomplete="current-password" required>
          <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>

        <form id="online-register-form" class="login-form" hidden>
          <input type="text" class="input" placeholder="Username" name="username" maxlength="32" autocomplete="username" required>
          <input type="email" class="input" placeholder="Email" name="email" autocomplete="email" required>
          <input type="password" class="input" placeholder="Password (min 8 chars)" name="password" minlength="8" autocomplete="new-password" required>
          <button type="submit" class="btn btn-primary btn-full">Register</button>
        </form>

        <div class="divider"><span>or</span></div>
        <a href="/api/v1/auth/spotify" class="btn btn-secondary btn-full" id="spotify-oauth-btn" hidden>
          <i class="ph ph-spotify-logo"></i> Continue with Spotify
        </a>
      </div>

      <p id="login-error" class="error-text" hidden></p>
    </div>

    <button class="theme-toggle btn-icon" aria-label="Toggle theme">
      <i class="ph ph-sun"></i>
    </button>
  </main>
</body>
</html>
