<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowdRoom — Room</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/pages/room.css">
  <script type="module" src="/js/pages/room.js"></script>
</head>
<body>
  <div class="page room-page">
    <header class="room-header">
      <h2 id="room-name">Loading...</h2>
      <div class="header-actions">
        <span id="room-code" class="badge"></span>
        <button class="theme-toggle btn-icon" aria-label="Toggle theme">
          <i class="ph ph-sun"></i>
        </button>
        <button id="leave-btn" class="btn btn-ghost btn-danger">Leave</button>
      </div>
    </header>

    <main class="room-layout">
      <section class="panel now-playing-panel">
        <div id="now-playing-empty" class="empty-state">
          <i class="ph ph-music-notes"></i>
          <p>Nothing playing</p>
        </div>
        <div id="now-playing" hidden>
          <img id="album-art" class="album-art" src="" alt="Album art">
          <div class="track-info">
            <h3 id="track-title"></h3>
            <p id="track-artist" class="text-secondary"></p>
          </div>
          <div class="now-playing-actions">
            <button id="now-playing-skip-btn" class="btn btn-icon" title="Vote to skip">
              <i class="ph ph-skip-forward"></i>
            </button>
            <span id="now-playing-votes" class="skip-vote-badge">0</span>
          </div>
          <div class="progress-container">
            <div class="progress-bar">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="progress-times">
              <span id="time-elapsed">0:00</span>
              <span id="time-total">0:00</span>
            </div>
          </div>
          <div id="host-controls" class="playback-controls" hidden>
            <button id="play-pause-btn" class="btn btn-icon" title="Play/Pause">
              <i class="ph ph-play" id="play-pause-icon"></i>
            </button>
            <button id="skip-btn" class="btn btn-icon" title="Skip">
              <i class="ph ph-skip-forward"></i>
            </button>
          </div>
        </div>
      </section>

      <section class="panel queue-panel">
        <h3><i class="ph ph-queue"></i> Queue</h3>
        <div id="queue-list" class="track-list"></div>
        <div id="queue-empty" class="empty-state">
          <i class="ph ph-playlist"></i>
          <p>Queue is empty. Search and add songs!</p>
        </div>
      </section>

      <section class="panel search-panel">
        <h3><i class="ph ph-magnifying-glass"></i> Search</h3>
        <div class="search-input-wrapper">
          <i class="ph ph-magnifying-glass"></i>
          <input id="search-input" type="text" class="input" placeholder="Search for songs..." autocomplete="off">
        </div>
        <div id="search-results" class="track-list"></div>
        <div id="search-empty" class="empty-state" hidden>
          <p>No results found.</p>
        </div>
      </section>

      <aside class="panel members-panel">
        <h3><i class="ph ph-users"></i> Members <span id="member-count" class="badge">0</span></h3>
        <ul id="members-list" class="members-list"></ul>
      </aside>

      <section class="panel history-panel">
        <details>
          <summary><h3><i class="ph ph-clock-counter-clockwise"></i> Recently Played</h3></summary>
          <div id="history-list" class="track-list"></div>
        </details>
      </section>
    </main>
  </div>

  <div id="spotify-credentials-modal" class="modal-overlay" hidden>
    <div class="modal">
      <h3>Set up Spotify App</h3>
      <p class="text-secondary" style="margin-bottom: var(--space-4);">
        Create a Spotify Developer app at
        <a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com</a>.
        Set the redirect URI to:
      </p>
      <code class="redirect-uri-display" id="redirect-uri-display"></code>
      <form id="spotify-credentials-form" style="margin-top: var(--space-4);">
        <div class="form-group">
          <label class="input-label" for="spotify-client-id">Client ID</label>
          <input type="text" id="spotify-client-id" class="input" placeholder="Your Spotify Client ID" required>
        </div>
        <div class="form-group" style="margin-top: var(--space-3);">
          <label class="input-label" for="spotify-client-secret">Client Secret</label>
          <input type="password" id="spotify-client-secret" class="input" placeholder="Your Spotify Client Secret" required>
        </div>
        <div class="modal-actions" style="margin-top: var(--space-4);">
          <button type="button" id="spotify-modal-cancel" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save & Connect</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('redirect-uri-display').textContent =
      window.location.origin + '/api/v1/auth/spotify/callback';
  </script>
</body>
</html>
